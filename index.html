<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixi-Labへようこそ</title>
    <style>
        /* ここからデザイン（CSS）の設定です */
        :root {
            --bg-color: #0f172a;      /* 深いネイビーの背景 */
            --card-bg: #1e293b;       /* 少し明るいカードの背景 */
            --text-main: #f8fafc;     /* メインの白い文字 */
            --text-sub: #94a3b8;      /* サブのグレーの文字 */
            --accent-color: #38bdf8;  /* アクセント用の水色 */
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: var(--accent-color);
        }

        p {
            color: var(--text-sub);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .btn {
            display: inline-block;
            background-color: var(--accent-color);
            color: var(--bg-color);
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Pixi-Lab</h1>
        <p>「遊びながら、ひらめこう。」をモットーに、Scratchやプログラミング作品を公開するプロジェクトです。</p>
        <a href="https://github.com/kyousuke1111/Pixi-Lab" class="btn" target="_blank">GitHubを見る</a>
    </div>

</body>
</html>
